steps:
  # Build da imagem Docker
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/dash-dre:$_TAG'
      - '.'

  # Push para Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/dash-dre:$_TAG'

  # Deploy no Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'dash-dre'
      - '--image=gcr.io/$PROJECT_ID/dash-dre:$_TAG'
      - '--region=southamerica-east1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--min-instances=0'
      - '--max-instances=3'
      - '--update-env-vars=BQ_PROJECT=meu-projeto-gcp'

substitutions:
  _TAG: latest

images:
  - 'gcr.io/$PROJECT_ID/dash-dre:$_TAG'
